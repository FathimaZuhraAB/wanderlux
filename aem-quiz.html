      { type:"mcq", q:"What annotation is used to define the configuration interface for an OSGi component?", opts:["@ObjectClassDefinition","@Configuration","@OsgiConfig","@ConfigurationAdmin"], ans:0, exp:"@ObjectClassDefinition (org.osgi.service.metatype.annotations) defines the configuration schema. The annotated interface defines properties displayed in the Felix console." },
      { type:"mcq", q:"How does an OSGi component read its configuration values?", opts:["Via JCR node properties","Through the @Activate method parameter annotated with @ObjectClassDefinition type","Via ResourceResolver","By reading system properties"], ans:1, exp:"The @Activate method accepts a parameter of the @ObjectClassDefinition-annotated interface type. The OSGi framework injects the current configuration values." },
      { type:"mcq", q:"What happens when an OSGi component's configuration is updated via the Felix console?", opts:["The component restarts only after server restart","The @Modified method is called (or @Activate if no @Modified exists)","The change is ignored until the next deployment","The whole bundle is restarted"], ans:1, exp:"If @Modified is defined, it is called with the new configuration. If not, @Deactivate then @Activate are called, effectively restarting the component with new config." },
      { type:"mcq", q:"Which OSGi console URL shows all registered services and their consumers?", opts:["/system/console/components","/system/console/services","/system/console/bundles","/system/console/configMgr"], ans:1, exp:"/system/console/services lists all registered OSGi services, their interfaces, properties, and which bundles are consuming them." },
      { type:"mcq", q:"What is the 'service.ranking' property used for in OSGi?", opts:["Defines the execution priority of the component","When multiple services implement the same interface, higher ranking is preferred","Sets the thread priority for service execution","Orders the component activation sequence"], ans:1, exp:"When multiple components implement the same service interface, OSGi uses service.ranking (higher value = higher priority) to determine which one is injected by default." },
      { type:"mcq", q:"Which annotation makes an OSGi component listen for configuration changes without restarting?", opts:["@Activate","@Modified","@Updated","@ConfigurationListener"], ans:1, exp:"@Modified marks a method called when the component's configuration changes, without requiring full deactivation/activation. Allows hot-reload of configuration." },
      { type:"mcq", q:"What is a 'Whiteboard Pattern' in OSGi?", opts:["A pattern for registering services that are automatically discovered by a listener/tracker","A debugging pattern for OSGi services","A pattern for sharing data between bundles","A way to configure multiple OSGi components at once"], ans:0, exp:"The Whiteboard Pattern registers services with specific properties, and a consumer (tracker) automatically discovers and uses them without direct coupling — e.g., Sling Servlet registration." },
      { type:"tf", q:"An OSGi bundle can import packages from another bundle even if they are not explicitly exported.", ans:false, exp:"OSGi enforces package-level visibility. A bundle must explicitly Export-Package to share it, and consuming bundles must Import-Package. Unexported packages are bundle-private." },
      { type:"tf", q:"OSGi configuration files with .cfg.json format support typed values (Integer, Boolean, etc.).", ans:true, exp:".cfg.json (OSGi R7 configuration format) supports typed values natively in JSON. The older .cfg format only supports String values and requires coercion." },
      { type:"tf", q:"The @Deactivate method is called when an OSGi component is stopped or its configuration is updated.", ans:true, exp:"@Deactivate is called during component deactivation — either when the bundle stops, configuration changes trigger restart, or the component is explicitly disabled." },
      { type:"short", q:"Explain the lifecycle of an OSGi Declarative Services component from bundle installation to deactivation.", ans:"1. Bundle Install: Bundle JAR is installed in OSGi. 2. Bundle Start: OSGi resolves dependencies; bundle classes become available. 3. Component Detection: SCR discovers @Component annotated classes. 4. Dependency Satisfaction: SCR checks all @Reference dependencies. When all required references are available, the component can be activated. 5. @Activate: Activation method is called with configuration values. Component is registered as a service if it implements an interface. 6. @Modified: Called if configuration changes (optional). 7. @Deactivate: Called when component is stopped, bundle uninstalled, or dependencies become unavailable. Component is unregistered." },
      { type:"scenario", q:"You need to create an OSGi service that sends email notifications. The SMTP server URL and credentials must be configurable per environment without redeployment. Describe how you would implement this.", scenario:"Service interface: EmailService with sendEmail(String to, String subject, String body). Configuration: smtpHost, smtpPort, smtpUser, smtpPassword.", ans:"1. Define config interface: @ObjectClassDefinition(name='Email Service Config') interface EmailServiceConfig with @AttributeDefinition methods for smtpHost, smtpPort, smtpUser, smtpPassword (password with type=AttributeType.PASSWORD). 2. Implement the service: @Component(service=EmailService.class) class EmailServiceImpl implements EmailService. Add @Activate method accepting EmailServiceConfig parameter to read and store config values. 3. Implement sendEmail() using stored config to create a JavaMail session. 4. Create run-mode-specific .cfg.json files (config.dev/, config.prod/) with environment-specific SMTP settings. 5. Values are updated at runtime via Felix console or by redeploying config packages without restarting the server." }
    ]
  },
  {
    id: "sling",
    name: "Sling Framework",
    icon: "8",
    desc: "URL resolution, resource types, resource super type",
    questions: [
      { type:"mcq", q:"What is the primary mechanism Sling uses to resolve a URL to a resource?", opts:["URL pattern matching like a Servlet container","Resource resolution via the ResourceResolver using the URL path","Page hierarchy traversal","JCR SQL2 query"], ans:1, exp:"Sling maps URLs directly to JCR resources using the ResourceResolver. The URL path maps to a JCR node path (with some transformations via ResourceResolver rules)." },
      { type:"mcq", q:"Given URL /content/mysite/en.model.json, which parts are the resource path, selector, and extension?", opts:["path=/content/mysite/en, selector=model, ext=json","path=/content/mysite, selector=en.model, ext=json","path=/content/mysite/en.model, selector=none, ext=json","path=/content/mysite/en, selector=none, ext=model.json"], ans:0, exp:"Sling URL structure: resource-path/selector.extension/suffix. So: path=/content/mysite/en, selectors=[model], extension=json." },
      { type:"mcq", q:"What JCR property defines the rendering script/component for a Sling resource?", opts:["jcr:resourceType","sling:resourceType","jcr:template","cq:componentType"], ans:1, exp:"sling:resourceType on a JCR node points to the component path (e.g., myproject/components/text) used to render that resource." },
      { type:"mcq", q:"How does Sling determine which script to use when rendering a resource?", opts:["Based on jcr:primaryType only","Based on sling:resourceType and the request method/extension/selectors to find the best-matching script","Based on the URL servlet mapping","Based on the component dialog"], ans:1, exp:"Sling uses Script Resolution: looks under the sling:resourceType path in the search path (/apps, /libs) for a script matching <resourcetype>/<selectors>.<ext>.<method>.jsp/html." },
      { type:"mcq", q:"What is sling:resourceSuperType used for?", opts:["To define the JCR node type","To specify a parent resource type for script/dialog inheritance","To set the Sling URL mapping","To define the component category"], ans:1, exp:"sling:resourceSuperType defines a component hierarchy for script inheritance — if a script isn't found in the current resource type, Sling looks in the super type." },
      { type:"mcq", q:"What is a Sling Servlet and how is it registered?", opts:["A Java Servlet mapped via web.xml","An OSGi service implementing SlingSafeMethodsServlet, registered with specific resourceTypes or paths/extensions via component properties","A JSP file with a .sling extension","A servlet registered via Sling configuration files"], ans:1, exp:"Sling Servlets are OSGi components (extending SlingAllMethodsServlet) registered with sling.servlet.resourceTypes, sling.servlet.extensions, and sling.servlet.methods properties." },
      { type:"mcq", q:"What does the Sling ResourceResolver's 'resolve' method do vs the 'getResource' method?", opts:["They are identical","resolve() applies URL-to-resource mapping (namespace mangling, aliases), getResource() does a direct JCR path lookup","resolve() only works for JCR resources, getResource() works for virtual resources","resolve() requires authentication, getResource() is anonymous"], ans:1, exp:"resolve() applies full URL mapping (including alias resolution and namespace handling) — used for incoming request URLs. getResource() is a direct path lookup without URL mapping." },
      { type:"mcq", q:"What is a Sling Alias?", opts:["A shortcut URL mapped to a resource path","A JCR node name alias","An alternative sling:resourceType","A Sling Servlet path shortcut"], ans:0, exp:"A Sling Alias (sling:alias property or resource mapping) provides an alternative URL path for a resource, allowing vanity URLs without changing JCR structure." },
      { type:"mcq", q:"In Sling, what is the 'search path' used for?", opts:["JCR search scope for queries","The ordered list of repository paths Sling searches to locate scripts and resources by resource type","The URL paths Sling accepts requests from","The paths Sling caches in memory"], ans:1, exp:"The Sling search path (default: [/apps, /libs]) defines where Sling looks for rendering scripts. /apps takes precedence over /libs, enabling overlays." },
      { type:"mcq", q:"What HTTP methods are handled by SlingAllMethodsServlet vs SlingSafeMethodsServlet?", opts:["SlingAllMethodsServlet handles all HTTP methods including POST/PUT/DELETE; SlingSafeMethodsServlet handles only GET and HEAD","SlingSafeMethodsServlet handles all methods; SlingAllMethodsServlet handles only safe ones","They handle the same methods","SlingAllMethodsServlet only handles POST"], ans:0, exp:"SlingSafeMethodsServlet handles safe, idempotent methods (GET, HEAD). SlingAllMethodsServlet extends it to also handle POST, PUT, DELETE, PATCH, etc." },
      { type:"tf", q:"Sling uses the full URL path including the hostname for resource resolution.", ans:false, exp:"By default, Sling uses only the path portion of the URL for resource resolution. Hostname-based mapping requires explicit ResourceResolver mapping configuration." },
      { type:"tf", q:"Sling resource types can be virtual — they don't have to correspond to actual JCR nodes.", ans:true, exp:"Sling resource types are just strings used for script lookup. While they typically correspond to component nodes in /apps or /libs, virtual resource types are possible." },
      { type:"tf", q:"Sling POST Servlet handles form submissions and JCR node creation/modification by default.", ans:true, exp:"The Sling POST Servlet (org.apache.sling.servlets.post.SlingPostServlet) handles POST requests to Sling resources, supporting operations like create, modify, delete, copy, move." },
      { type:"short", q:"Explain the full Sling URL decomposition for: /content/we-retail/us/en/products.infinite.5.html/jcr:content and how Sling resolves it.", ans:"Decomposition: Resource Path: /content/we-retail/us/en/products. Selectors: [infinite, 5]. Extension: html. Suffix: /jcr:content. Sling resolution: 1. ResourceResolver maps path to JCR node at /content/we-retail/us/en/products. 2. Reads sling:resourceType from that node (e.g., weretail/components/structure/page). 3. Looks in /apps/weretail/components/structure/page/ for script: products.infinite.5.html or products.infinite.html or products.html (trying selectors in order). 4. The matching script is executed with the resource, selectors, and suffix available via the request object." },
      { type:"scenario", q:"You need to create a Sling Servlet that handles GET requests to any resource of type 'myproject/components/product' with the selector 'details' and extension 'json', returning product details as JSON. Describe the implementation.", scenario:"Component resource type: myproject/components/product. Expected URL: /content/mysite/products/product-1.details.json", ans:"@Component(service=Servlet.class, property={Constants.SERVICE_DESCRIPTION+'=Product Details Servlet', ServletResolverConstants.SLING_SERVLET_RESOURCE_TYPES+'=myproject/components/product', ServletResolverConstants.SLING_SERVLET_SELECTORS+'=details', ServletResolverConstants.SLING_SERVLET_EXTENSIONS+'=json', ServletResolverConstants.SLING_SERVLET_METHODS+'=GET'}) public class ProductDetailsServlet extends SlingSafeMethodsServlet { @Override protected void doGet(SlingHttpServletRequest req, SlingHttpServletResponse resp) throws IOException { Resource resource = req.getResource(); ValueMap props = resource.getValueMap(); // Build JSON response JSONObject json = new JSONObject(); json.put('title', props.get('title', String.class)); resp.setContentType('application/json'); resp.getWriter().write(json.toString()); } }" }
    ]
  },
  {
    id: "dispatcher",
    name: "Dispatcher",
    icon: "9",
    desc: "Caching, flushing, security, configuration",
    questions: [
      { type:"mcq", q:"What is the primary role of the AEM Dispatcher?", opts:["Content authoring tool","Load balancer and caching layer that serves static content from cache","Replication agent for content publishing","OSGi component manager"], ans:1, exp:"The Dispatcher is a caching and load-balancing tool. It serves cached content to reduce load on AEM publish instances and acts as a security layer." },
      { type:"mcq", q:"What type of HTTP requests does Dispatcher typically NOT cache?", opts:["GET requests with no query string","HEAD requests","POST requests and GET requests with query parameters","Requests for HTML pages"], ans:2, exp:"Dispatcher doesn't cache POST requests (by default) or GET/HEAD requests with query strings. These require dynamic content generation." },
      { type:"mcq", q:"What is Dispatcher cache invalidation and how is it triggered?", opts:["Dispatcher flushes cache on a schedule","AEM sends an HTTP request (via flush replication agent) to Dispatcher when content changes, causing it to delete cached files","The OS file system monitors JCR changes and clears cache","The browser clears the cache on new content"], ans:1, exp:"When content is activated/replicated, AEM's flush replication agent sends an HTTP DELETE or INVALIDATE request to Dispatcher, which deletes cached files for that path." },
      { type:"mcq", q:"Which file in the Dispatcher configuration controls which URLs are cached?", opts:["dispatcher.any","cache.conf","httpd.conf","vhost.conf"], ans:0, exp:"The dispatcher.any file (or its farm-specific includes) contains /cache /rules sections that define which URL patterns are cached or excluded from caching." },
      { type:"mcq", q:"What does the /filter section in dispatcher.any control?", opts:["Which requests are cached","Which HTTP requests are forwarded to AEM vs blocked","Which content is replicated","Which Sling resources are accessible"], ans:1, exp:"The /filter section in dispatcher.any defines allow/deny rules for incoming HTTP requests, acting as a security filter to block unauthorized access to internal paths." },
      { type:"mcq", q:"What is a Dispatcher 'farm'?", opts:["A group of AEM instances","A set of configuration rules (cache, filter, renders) for a specific virtual host or domain","A collection of replication agents","A content sync group"], ans:1, exp:"A farm in dispatcher.any groups related configuration (renders/backend AEM instances, cache rules, filter rules) for a specific virtual host or set of domains." },
      { type:"mcq", q:"Which HTTP response header prevents the Dispatcher from caching a specific response?", opts:["Cache-Control: no-store","Dispatcher: no-cache","X-AEM-nocache: true","Pragma: no-cache"], ans:0, exp:"Cache-Control: no-cache or no-store headers (standard HTTP cache control) instruct Dispatcher not to cache that response." },
      { type:"mcq", q:"What is the purpose of 'stat files' in Dispatcher caching?", opts:["They track request statistics","They are used as cache invalidation markers — when a .stat file is updated, any cached files older than the .stat file are considered stale","They log Dispatcher errors","They store session state"], ans:1, exp:".stat files are created in the cache root. When content changes, the .stat file is 'touched' (timestamp updated). Dispatcher compares cached file timestamps against .stat — older files are re-fetched." },
      { type:"mcq", q:"How does Dispatcher handle content for logged-in users (personalized content)?", opts:["It caches per-user copies","Dispatcher cannot cache personalized content — requests with session cookies are typically not cached","It uses ESI (Edge Side Includes) automatically","It caches a shared version for all users"], ans:1, exp:"Dispatcher doesn't cache requests with cookies by default (configurable). For logged-in users with session cookies, requests bypass cache and go to AEM directly." },
      { type:"mcq", q:"What is the 'graceful' invalidation mode in Dispatcher?", opts:["A mode that delays cache clearing by 5 seconds","A mode where cached files are marked stale but not deleted immediately — served until re-requested, then refreshed from AEM","A mode that doesn't invalidate cache on publish","A mode for partial cache updates"], ans:1, exp:"In graceful (or 'lazy') invalidation, files are marked stale but remain in cache. They continue to be served until the next request for them, at which point they are refreshed from AEM, reducing cache storms." },
      { type:"tf", q:"The Dispatcher can cache HTTPS (SSL) requests by default without additional configuration.", ans:false, exp:"Dispatcher sits in front of SSL termination (usually handled by a web server/load balancer). SSL is typically terminated before reaching Dispatcher, which then handles plain HTTP internally." },
      { type:"tf", q:"Dispatcher can be configured to allow certain URL paths to always bypass the cache.", ans:true, exp:"The /cache /rules section supports deny rules for specific URL patterns, ensuring requests matching those patterns always go to the AEM publish instance." },
      { type:"tf", q:"A Dispatcher flush agent must be configured on the AEM Author instance to clear publish-side caches.", ans:false, exp:"The flush agent is configured on the AEM Publish instance (or Author for author-side invalidation). The Publish instance sends invalidation requests to Dispatcher when content is activated to it." },
      { type:"short", q:"Explain the security benefits of using Dispatcher in front of AEM Publish. Name at least 4 protections it provides.", ans:"1. URL Filtering: The /filter section blocks access to internal AEM paths (/system/console, /crx/de, /content/dam internal paths, /etc, /libs) from public internet. 2. Protection from direct AEM access: Only Dispatcher's allowed paths are exposed publicly. 3. DoS mitigation: Caching reduces load on AEM, providing some protection against traffic spikes. 4. Blocking dangerous HTTP methods: Can restrict PUT, DELETE, TRACE methods. 5. Referrer filtering: Works with AEM's Referrer Filter to prevent CSRF attacks. 6. SSL termination: Centralizes HTTPS at Dispatcher level. 7. IP allowlisting: Can restrict admin paths to specific IP ranges." },
      { type:"scenario", q:"You activate a content page in AEM but the Dispatcher is still serving the old cached version. Walk through the diagnostic and resolution steps.", scenario:"AEM Author → Replication → AEM Publish → Dispatcher → Users. Content was activated successfully (green tick in AEM).", ans:"1. Verify the flush replication agent: In AEM Publish (or Author for publish flush), check /etc/replication/agents.publish/ — look for the flush agent and test its connection. 2. Check flush agent logs for errors (connection refused, wrong Dispatcher host/port). 3. Verify the Dispatcher host/port in the flush agent matches the actual Dispatcher server. 4. Check Dispatcher logs (/var/log/dispatcher.log) for incoming invalidation requests. 5. Manually check if the cached file exists: ls /path/to/dispatcher/cache/content/mysite/mypage.html. 6. Manually send a flush request: curl -H 'CQ-Action: Delete' -H 'CQ-Handle: /content/mysite/mypage' http://dispatcher-host/dispatcher/invalidate.cache. 7. Check /statfilelevel configuration in dispatcher.any — may be limiting invalidation scope. 8. Verify /filter rules aren't blocking the flush request." }
    ]
  },
  {
    id: "style-systems",
    name: "Style Systems",
    icon: "10",
    desc: "CSS class-based styling, policies, authoring",
    questions: [
      { type:"mcq", q:"What does the AEM Style System allow authors to do?", opts:["Edit CSS files directly in AEM","Apply predefined CSS classes to components without code changes","Create new components via drag and drop","Modify HTML structure of components"], ans:1, exp:"The Style System lets template editors define named CSS class groups (styles), which content authors can then apply to components from the component toolbar." },
      { type:"mcq", q:"Where are Style System styles configured for a component?", opts:["In the component's cq:dialog","In the component's design dialog (cq:design_dialog)","In the Template Policy for that component","In the clientlib configuration"], ans:2, exp:"Styles are defined in the Template Policy for a specific component. Template editors open the policy editor and define style groups and individual style names/CSS classes." },
      { type:"mcq", q:"Which JCR node stores the style classes applied by an author on a specific component instance?", opts:["jcr:content/styles","jcr:content/cq:styleIds","cq:stylegroups on the component","The component node's cq:styleIds property"], ans:3, exp:"When an author applies a style, the selected style ID is stored in the cq:styleIds property on the component's jcr:content or the component node itself." },
      { type:"mcq", q:"How are Style System CSS classes applied to the component HTML output?", opts:["The author edits the component HTL directly","AEM automatically wraps the component in a div with the selected class names","The component HTL must use the 'styles' use object to apply selected classes","Styles are applied via JavaScript on page load"], ans:2, exp:"The component's HTL must use: <sly data-sly-use.styles='${currentStyle}'/> and apply ${styles.classes} to the wrapper element. Core Components handle this automatically." },
      { type:"mcq", q:"What is a 'Style Group' in the Style System?", opts:["A CSS class group in a stylesheet","A named collection of mutually exclusive or combinable styles presented to authors in the styles tab","A set of components sharing the same styles","A group of template policies"], ans:1, exp:"A Style Group is a named category in the Policy editor that groups related styles (e.g., 'Color Theme', 'Layout'). Authors see groups in the Styles tab with available options." },
      { type:"mcq", q:"Which Core Component feature enables the Style System to work automatically on all Core Components?", opts:["The Component Adapter","The Style object (com.adobe.cq.wcm.core.components.models.datalayer.ComponentData)","The Styles HTL Use object built into Core Component base HTL","The Core Component Policy"], ans:2, exp:"Core Components' base HTL already includes data-sly-use.styles='${currentStyle}' and ${styles.classes} on the wrapper, so styles work out-of-the-box without custom HTL changes." },
      { type:"mcq", q:"Can a component have multiple Style Groups applied simultaneously?", opts:["No, only one style can be active at a time","Yes, one style from each Style Group can be applied simultaneously","Yes, but only in preview mode","Only if allowMultiple is set on the component"], ans:1, exp:"Yes — authors can select one style from each Style Group simultaneously. Styles from different groups are combined (their CSS classes are all applied). Within a group, selection depends on group configuration." },
      { type:"mcq", q:"What is the 'Allow Multiple Selections' option in a Style Group?", opts:["Allows multiple components to share the same style","Allows authors to select more than one style within the same group","Allows the style to be used on multiple resource types","Allows styles from multiple policies"], ans:1, exp:"'Allow Multiple Selections' lets authors pick more than one style from that specific Style Group simultaneously, combining their CSS classes on the component." },
      { type:"mcq", q:"How does the Style System affect component accessibility?", opts:["It has no impact on accessibility","Styles only add visual classes, so accessibility depends on what those CSS classes do — styles must be designed with accessibility in mind","It automatically adds ARIA attributes","It breaks accessibility if used incorrectly"], ans:1, exp:"Style System only adds/removes CSS classes. The impact on accessibility depends entirely on what those CSS classes do (hide elements, change focus order, alter contrast, etc.)." },
      { type:"mcq", q:"Where does a developer need to add logic to ensure the style system classes are rendered in a custom component?", opts:["In the OSGi service","In the component's HTL using the Styles use object","In the component's Java model","In the dispatcher configuration"], ans:1, exp:"In the component's HTL: <sly data-sly-use.styles='${currentStyle}'/> then apply ${styles.classes} to the component's wrapper element: <div class='mycomponent ${styles.classes}'>." },
      { type:"tf", q:"Style System changes require a new deployment (code deployment) to take effect.", ans:false, exp:"Style System is entirely configuration-driven. Styles are configured in policies (stored in /conf), and CSS classes are in clientlibs. No code deployment is needed — just clientlib changes and policy configuration." },
      { type:"tf", q:"Custom components must explicitly implement the Style System by using the styles use object in their HTL.", ans:true, exp:"Unlike Core Components, custom components must explicitly add data-sly-use.styles and apply ${styles.classes} in their HTL. It's not automatic for custom components." },
      { type:"tf", q:"Styles defined in one template's policy can be reused across multiple templates automatically.", ans:false, exp:"Policies can be shared across templates (by pointing to the same policy path in /conf), but styles are configured per-policy. If policies are shared, styles are shared; otherwise each template has its own policy." },
      { type:"short", q:"Explain the end-to-end workflow for implementing a Style System feature — from developer to content author — for a custom 'Hero' component.", ans:"Developer: 1. Create the CSS classes in the component's clientlib (e.g., .hero--dark-theme, .hero--light-theme). 2. Add the Styles use object to hero.html: <sly data-sly-use.styles='${currentStyle}'/> and apply <div class='hero ${styles.classes}'>. Template Editor: 3. Open the Template Editor for the relevant template. 4. Select the Hero component and open its policy. 5. Under Styles, add a group 'Color Theme' and add styles: 'Dark Theme' (CSS class: hero--dark-theme) and 'Light Theme' (CSS class: hero--light-theme). Content Author: 6. Place the Hero component on a page. 7. Click the component, open the Styles tab (paintbrush icon). 8. Select 'Dark Theme' — the hero--dark-theme class is added to the wrapper, applying the dark styling." },
      { type:"scenario", q:"A content author reports that the Style System 'Styles' tab is not appearing on a custom component in the page editor. What would you check to troubleshoot this?", scenario:"The component is placed on a page using an Editable Template. Core Components work fine with the Style System on the same page.", ans:"1. Verify the component's HTL includes data-sly-use.styles='${currentStyle}' and applies ${styles.classes} to the wrapper element — if missing, the styles tab won't show even if configured. 2. Check the Template Policy: open Template Editor, find the component's policy, and verify styles are actually defined there (not just that a policy exists). 3. Ensure the WCM Core Components bundle is present (it provides the Style System infrastructure) — /system/console/bundles. 4. Verify the template used by the page has a valid policy associated with the container/component. 5. Check if the component's cq:editConfig has a cq:inplaceEditing or configuration that might interfere. 6. Confirm the user has Template Editor role or that styles are enabled in the Policy (some setups require explicit policy linking). 7. Check browser console for JavaScript errors in the AEM editor." }
    ]
  },
  {
    id: "fragments",
    name: "Content & Experience Fragments",
    icon: "11",
    desc: "CF, XF, Sling Model Exporter, headless",
    questions: [
      { type:"mcq", q:"What is the primary difference between a Content Fragment and an Experience Fragment?", opts:["Content Fragments are for images, Experience Fragments are for text","Content Fragments are pure content (channel-agnostic, structured), Experience Fragments are reusable page layouts with design/formatting","Content Fragments are only for APIs, Experience Fragments are for pages","There is no practical difference"], ans:1, exp:"Content Fragments are structured, channel-agnostic content (like a headless CMS). Experience Fragments are complete, styled page snippets reusable across pages, channels, and even external systems like Adobe Target." },
      { type:"mcq", q:"Where are Content Fragments stored in AEM?", opts:["/content/fragments","/content/dam (as DAM assets)","/conf/fragments","/apps/fragments"], ans:1, exp:"Content Fragments are stored in the DAM (/content/dam) as assets of type dam:Asset with subnodes, similar to other assets but with structured content subnodes." },
      { type:"mcq", q:"What defines the structure of a Content Fragment?", opts:["A Sling Model","A Content Fragment Model (defined in /conf)","A JCR node type","An XSD schema"], ans:1, exp:"A Content Fragment Model (defined in /conf/<config>/settings/dam/cfm/models/) defines the fields (text, number, date, references, etc.) for Content Fragments of that type." },
      { type:"mcq", q:"How can you expose a Content Fragment as a JSON API in AEM?", opts:["Via a custom Sling Servlet only","Using the built-in Content Services/Content Fragment Export feature (/content/path.model.json) powered by Sling Model Exporter","By activating the content to publish as JSON","Via the AEM Assets HTTP API (/api/assets)"], ans:1, exp:"AEM Content Services uses Sling Model Exporter to expose content as JSON via the .model.json selector. The Page/CF model is annotated with @Exporter and serialized automatically." },
      { type:"mcq", q:"What is the Sling Model Exporter?", opts:["A tool to export Sling Models to Java classes","A framework that serializes Sling Models to formats like JSON via registered exporters (e.g., Jackson)","A way to export models to CRXDE","A replication tool for Sling Models"], ans:1, exp:"Sling Model Exporter allows a Sling Model to be serialized (e.g., to JSON using Jackson) and served via a URL selector (e.g., .model.json), enabling headless content delivery." },
      { type:"mcq", q:"Which annotation enables a Sling Model to be exported as JSON?", opts:["@JsonExport","@Exporter(name='jackson', extensions='json')","@ModelExport(json=true)","@Serializable"], ans:1, exp:"@Exporter(name='jackson', extensions='json') on a Sling Model class registers it with the Jackson-based exporter, making it available at .model.json URLs." },
      { type:"mcq", q:"How can you export an Experience Fragment to Adobe Target?", opts:["Via a Sling Servlet","Using the 'Export to Target' option in the XF editor, which uses the Adobe Target integration","Via the AEM Exporter OSGi service","Through a manual copy-paste"], ans:1, exp:"Experience Fragments can be exported to Adobe Target as HTML or JSON offers using the 'Export to Target' workflow, powered by the AEM-Target integration." },
      { type:"mcq", q:"What is a Content Fragment Variation?", opts:["A different language version of the fragment","An alternate version of the fragment's content for different channels or contexts","A sub-fragment nested inside another","A version history entry"], ans:1, exp:"Variations are alternate versions of a Content Fragment's content (e.g., 'Short', 'Social Media', 'Print') that share the same model/structure but have different content values." },
      { type:"mcq", q:"Which AEM API provides a GraphQL interface for querying Content Fragments?", opts:["AEM Content Services REST API","AEM Assets HTTP API","AEM Content Fragments GraphQL API (/content/graphql/global/endpoint.json)","Sling Model Exporter API"], ans:2, exp:"AEM provides a built-in GraphQL API for headless content delivery of Content Fragments, accessible via /content/graphql/global/endpoint.json or custom endpoints." },
      { type:"mcq", q:"What is the purpose of the 'master' variation in a Content Fragment?", opts:["It is the published version","It is the primary/default variation that cannot be deleted and serves as the base","It is automatically synced to Experience Fragments","It is the oldest version in version history"], ans:1, exp:"The 'master' variation is the default, undeletable variation of every Content Fragment. It contains the primary content and is the baseline for creating other variations." },
      { type:"tf", q:"Content Fragments can contain images and other binary assets directly within their fields.", ans:true, exp:"Content Fragment Models support Content Reference fields that can reference DAM assets (images, documents, etc.) — the fragment stores a reference path to the asset." },
      { type:"tf", q:"Experience Fragments can be exported to third-party systems like Adobe Target and Offer Management.", ans:true, exp:"XFs are designed for omnichannel delivery. They can be exported to Adobe Target (as HTML/JSON offers), Offer Management, and other integrated platforms." },
      { type:"tf", q:"The Sling Model Exporter requires the @Exporter annotation to work — @Model alone is insufficient.", ans:true, exp:"@Model alone only enables Java adaptation. The @Exporter annotation (with name and extensions) additionally registers the model for URL-based JSON serialization." },
      { type:"short", q:"Explain the difference between using Content Fragments with AEM Content Services (REST) vs the new GraphQL API for headless delivery. When would you choose one over the other?", ans:"Content Services (REST/.model.json): Page-based, exposes page structure with embedded CF data. Good for page-level content delivery, CMS-driven SPAs. Less flexible querying. GraphQL: Query-based, allows precise fetching of specific CF fields across models. Supports fragments of fragments, filtering, sorting, pagination. Ideal for headless implementations, mobile apps, and SPAs needing fine-grained data control. Choose REST when: delivering full page content to a rendering app. Choose GraphQL when: building headless apps needing flexible, efficient data fetching with minimal over/under-fetching." },
      { type:"scenario", q:"You need to make a custom 'Product' Sling Model available as a JSON API at the URL /content/products/product-1.model.json. Describe the complete implementation including annotations.", scenario:"Model should expose: productName (String), price (Double), imageUrl (String), and a nested 'specs' object with weight and dimensions.", ans:"1. @Model(adaptables=Resource.class, defaultInjectionStrategy=OPTIONAL) @Exporter(name='jackson', extensions='json') public class ProductModel { @ValueMapValue private String productName; @ValueMapValue private Double price; @ValueMapValue private String imageUrl; @ChildResource private Resource specs; @JsonProperty('specs') public SpecsModel getSpecs() { return specs != null ? specs.adaptTo(SpecsModel.class) : null; } /* getters for all fields */ } 2. Create SpecsModel as a separate @Model with weight and dimensions fields. 3. Use @JsonIgnore on any fields/methods you don't want exposed. 4. Register the model in the Sling Models factory in your bundle. 5. Access at: /content/products/product-1.model.json. 6. Optionally use @ExporterOption(name='SerializationFeature.INDENT_OUTPUT', value='true') for formatted output." }
    ]
  }
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let selectedTopics = new Set();
let quizQuestions = [];
let currentQ = 0;
let answers = {}; // index -> {selected, correct}
let answeredQ = {};

// ─── HOME ─────────────────────────────────────────────────────────────────────
function buildTopicGrid() {
  const grid = document.getElementById('topicGrid');
  TOPICS.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'topic-card';
    div.id = 'tc-' + t.id;
    div.onclick = () => toggleTopic(t.id);
    div.innerHTML = `
      <div class="q-count">${t.questions.length} Qs</div>
      <div class="topic-num">${t.icon}</div>
      <h3>${t.name}</h3>
      <p>${t.desc}</p>
    `;
    grid.appendChild(div);
  });
  updateStartBtn();
}

function toggleTopic(id) {
  if (selectedTopics.has(id)) { selectedTopics.delete(id); document.getElementById('tc-'+id).classList.remove('selected'); }
  else { selectedTopics.add(id); document.getElementById('tc-'+id).classList.add('selected'); }
  updateStartBtn();
}

function selectAll() { TOPICS.forEach(t => { selectedTopics.add(t.id); document.getElementById('tc-'+t.id).classList.add('selected'); }); updateStartBtn(); }
function selectNone() { TOPICS.forEach(t => { selectedTopics.delete(t.id); document.getElementById('tc-'+t.id).classList.remove('selected'); }); updateStartBtn(); }

function updateStartBtn() {
  const n = selectedTopics.size;
  const total = TOPICS.filter(t => selectedTopics.has(t.id)).reduce((s,t)=>s+t.questions.length,0);
  document.getElementById('startCount').textContent = n > 0 ? `(${n} topics · ${total} questions)` : '(0 topics selected)';
  document.getElementById('startBtn').disabled = n === 0;
}

function startQuiz() {
  quizQuestions = [];
  TOPICS.filter(t => selectedTopics.has(t.id)).forEach(t => {
    t.questions.forEach((q,i) => quizQuestions.push({...q, topicName: t.name, topicId: t.id, localIdx: i}));
  });
  currentQ = 0; answers = {}; answeredQ = {};
  showScreen('screen-quiz');
  renderQuestion();
}

function goHome() { showScreen('screen-home'); }
function restartQuiz() { startQuiz(); }

// ─── QUIZ ─────────────────────────────────────────────────────────────────────
function renderQuestion() {
  const q = quizQuestions[currentQ];
  const total = quizQuestions.length;
  document.getElementById('quizTopicLabel').textContent = q.topicName;
  document.getElementById('qCurrent').textContent = currentQ + 1;
  document.getElementById('qTotal').textContent = total;
  document.getElementById('progressFill').style.width = ((currentQ+1)/total*100)+'%';

  const typeMap = {mcq:'MCQ', tf:'True / False', short:'Short Answer', scenario:'Scenario'};
  const typeClass = {mcq:'type-mcq', tf:'type-tf', short:'type-short', scenario:'type-scenario'};

  let html = `
    <div class="q-type-badge ${typeClass[q.type]}">${typeMap[q.type]}</div>
    <div class="q-topic">${q.topicName}</div>
    <div class="q-number">Q${currentQ+1} of ${total}</div>
    ${q.scenario ? `<div class="q-scenario-box">📋 Scenario: ${q.scenario}</div>` : ''}
    <div class="q-text">${q.q}</div>
  `;

  const saved = answeredQ[currentQ];

  if (q.type === 'mcq') {
    html += '<div class="options">';
    q.opts.forEach((opt, i) => {
      let cls = 'option';
      if (saved) {
        if (i === q.ans) cls += ' correct';
        else if (i === saved.selected) cls += ' wrong';
      } else if (answers[currentQ] !== undefined && answers[currentQ] === i) cls += ' selected';
      html += `<div class="${cls}" onclick="selectMCQ(${i})">
        <div class="option-letter">${String.fromCharCode(65+i)}</div>
        <div class="option-text">${opt}</div>
      </div>`;
    });
    html += '</div>';
  } else if (q.type === 'tf') {
    const tCls = getTFClass(true, saved, q);
    const fCls = getTFClass(false, saved, q);
    html += `<div class="tf-options">
      <button class="tf-btn ${tCls}" onclick="selectTF(true)">✅ True</button>
      <button class="tf-btn ${fCls}" onclick="selectTF(false)">❌ False</button>
    </div>`;
  } else {
    const savedText = answers[currentQ] || '';
    html += `<textarea class="short-answer-area" id="shortAns" placeholder="Type your answer here..." onchange="saveShort(this.value)">${savedText}</textarea>`;
  }

  // Feedback
  if (saved) {
    const isCorrect = saved.correct;
    const fb = isCorrect ? 'feedback-correct' : (q.type === 'short' || q.type === 'scenario' ? 'feedback-info' : 'feedback-wrong');
    const icon = isCorrect ? '✅' : (q.type === 'short' || q.type === 'scenario' ? '📖' : '❌');
    const title = isCorrect ? 'Correct!' : (q.type === 'short' || q.type === 'scenario' ? 'Model Answer' : 'Incorrect');
    html += `<div class="feedback-box ${fb} show"><strong>${icon} ${title}</strong>${q.exp || q.ans}</div>`;
  }

  document.getElementById('questionCard').innerHTML = html;
  document.getElementById('btnPrev').disabled = currentQ === 0;
  document.getElementById('btnNext').style.display = answeredQ[currentQ] ? 'inline-flex' : 'none';
  document.getElementById('btnSkip').style.display = currentQ < quizQuestions.length-1 ? 'inline-flex' : 'none';

  // If this is the last answered question, show finish button
  if (answeredQ[currentQ] && currentQ === quizQuestions.length - 1) {
    document.getElementById('btnNext').textContent = '🏁 Finish';
  } else {
    document.getElementById('btnNext').textContent = 'Next →';
  }
}

function getTFClass(val, saved, q) {
  if (!saved) {
    const pending = answers[currentQ];
    if (pending === val) return 'selected';
    return '';
  }
  if (val === q.ans) return 'reveal-correct';
  if (val === saved.selected && val !== q.ans) return 'wrong';
  return '';
}

function selectMCQ(i) {
  if (answeredQ[currentQ]) return;
  answers[currentQ] = i;
  renderQuestion();
  // Show check button
  showCheckBtn();
}

function selectTF(val) {
  if (answeredQ[currentQ]) return;
  answers[currentQ] = val;
  renderQuestion();
  showCheckBtn();
}

function saveShort(val) { answers[currentQ] = val; }

function showCheckBtn() {
  const btn = document.getElementById('btnNext');
  btn.textContent = 'Check Answer ✓';
  btn.style.display = 'inline-flex';
  btn.onclick = checkAnswer;
}

function checkAnswer() {
  const q = quizQuestions[currentQ];
  let correct = false;
  if (q.type === 'mcq') { correct = answers[currentQ] === q.ans; }
  else if (q.type === 'tf') { correct = answers[currentQ] === q.ans; }
  else { correct = false; } // short/scenario are self-assessed
  answeredQ[currentQ] = { selected: answers[currentQ], correct };

  // Restore next button
  document.getElementById('btnNext').onclick = nextQ;
  renderQuestion();
}

function nextQ() {
  if (currentQ < quizQuestions.length - 1) { currentQ++; renderQuestion(); }
  else { showResults(); }
}

function prevQ() { if (currentQ > 0) { currentQ--; renderQuestion(); } }

function skipQ() {
  answeredQ[currentQ] = { selected: null, correct: false, skipped: true };
  if (currentQ < quizQuestions.length - 1) { currentQ++; renderQuestion(); }
  else { showResults(); }
}

// ─── RESULTS ──────────────────────────────────────────────────────────────────
function showResults() {
  showScreen('screen-results');
  const total = quizQuestions.length;
  let correct = 0, wrong = 0, skip = 0;
  quizQuestions.forEach((q, i) => {
    const a = answeredQ[i];
    if (!a || a.skipped) skip++;
    else if (a.correct) correct++;
    else wrong++;
  });

  // For short/scenario — they're self-assessed, count as correct if answered
  quizQuestions.forEach((q, i) => {
    if ((q.type === 'short' || q.type === 'scenario') && answeredQ[i] && !answeredQ[i].skipped) {
      // They were marked incorrect by default; adjust
    }
  });

  const pct = Math.round((correct / total) * 100);
  const grade = pct >= 80 ? 'Great' : pct >= 60 ? 'Good' : 'Needs Work';
  const emoji = pct >= 80 ? '🎉' : pct >= 60 ? '👍' : '📚';
  const circleClass = pct >= 80 ? 'score-great' : pct >= 60 ? 'score-good' : 'score-low';

  document.getElementById('scoreCard').innerHTML = `
    <div class="score-circle ${circleClass}">
      <span class="pct">${pct}%</span>
      <span class="label">${grade}</span>
    </div>
    <h2>${emoji} Quiz Complete!</h2>
    <p>You answered ${correct + wrong} of ${total} questions (${skip} skipped)</p>
    <div class="score-stats">
      <div class="stat-pill stat-correct">✅ ${correct} Correct</div>
      <div class="stat-pill stat-wrong">❌ ${wrong} Incorrect</div>
      <div class="stat-pill stat-skip">⏭ ${skip} Skipped</div>
    </div>
  `;

  // Topic breakdown
  const topicMap = {};
  TOPICS.filter(t => selectedTopics.has(t.id)).forEach(t => { topicMap[t.id] = {name: t.name, correct: 0, total: 0}; });
  quizQuestions.forEach((q, i) => {
    if (!topicMap[q.topicId]) return;
    topicMap[q.topicId].total++;
    if (answeredQ[i] && answeredQ[i].correct) topicMap[q.topicId].correct++;
  });

  let bHtml = '<h3>📊 Topic Breakdown</h3>';
  Object.values(topicMap).forEach(t => {
    const tp = t.total > 0 ? Math.round((t.correct/t.total)*100) : 0;
    const barColor = tp >= 80 ? 'var(--correct)' : tp >= 60 ? 'var(--warn)' : 'var(--wrong)';
    bHtml += `<div class="topic-row">
      <div class="topic-row-name">${t.name}</div>
      <div class="topic-bar-wrap"><div class="topic-bar" style="width:${tp}%;background:${barColor}"></div></div>
      <div class="topic-row-score" style="color:${barColor}">${t.correct}/${t.total}</div>
    </div>`;
  });
  document.getElementById('topicBreakdown').innerHTML = bHtml;
}

// ─── ANSWER KEY ───────────────────────────────────────────────────────────────
function showAnswerKey() {
  showScreen('screen-key');
  const typeMap = {mcq:'MCQ', tf:'True / False', short:'Short Answer', scenario:'Scenario'};
  let html = '';
  TOPICS.filter(t => selectedTopics.has(t.id)).forEach(t => {
    html += `<div class="key-section"><h3>${t.icon}. ${t.name}</h3>`;
    t.questions.forEach((q, i) => {
      let ansText = '';
      if (q.type === 'mcq') ansText = `<strong>${String.fromCharCode(65+q.ans)}.</strong> ${q.opts[q.ans]}`;
      else if (q.type === 'tf') ansText = q.ans ? 'True' : 'False';
      else ansText = q.ans;

      html += `<div class="key-item">
        <div class="q-type-badge type-${q.type}" style="display:inline-block;margin-bottom:6px;">${typeMap[q.type]}</div>
        <div class="key-q">Q${i+1}. ${q.q}</div>
        ${q.scenario ? `<div class="q-scenario-box" style="margin-bottom:8px;">${q.scenario}</div>` : ''}
        <div class="key-a"><strong>Answer:</strong> ${ansText}${q.exp ? '<br><br><strong>Explanation:</strong> '+q.exp : ''}</div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('answerKeyContent').innerHTML = html;
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// Init
buildTopicGrid();
</script>
</body>
</html>
