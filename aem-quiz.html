<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEM Interview Prep Quiz</title>
<style>
  :root {
    --primary: #eb1000;
    --primary-dark: #b50d00;
    --bg: #f5f6fa;
    --card: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e5e7eb;
    --correct: #16a34a;
    --wrong: #dc2626;
    --warn: #d97706;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 24px 32px; display: flex; align-items: center; gap: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .header-logo { width: 44px; height: 44px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { font-size: 13px; color: #94a3b8; margin-top: 2px; }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* HOME */
  .home-container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
  .home-hero { text-align: center; margin-bottom: 40px; }
  .home-hero h2 { font-size: 32px; font-weight: 800; color: #1a1a2e; }
  .home-hero p { color: var(--muted); margin-top: 8px; font-size: 16px; }
  .badge { display: inline-block; background: #fef3c7; color: #92400e; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 12px; }

  .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .topic-card { background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
  .topic-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(235,16,0,0.15); }
  .topic-card.selected { border-color: var(--primary); background: #fff5f5; }
  .topic-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .topic-card p { font-size: 12px; color: var(--muted); }
  .topic-card .q-count { position: absolute; top: 12px; right: 12px; background: var(--bg); border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: 600; color: var(--muted); }
  .topic-card.selected .q-count { background: var(--primary); color: white; }
  .topic-num { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--primary), #ff4444); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; margin-bottom: 10px; }

  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; border-radius: 8px; border: none; cursor: pointer; font-size: 15px; font-weight: 600; transition: all 0.2s; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 15px rgba(235,16,0,0.3); }
  .btn-secondary { background: var(--card); color: var(--text); border: 2px solid var(--border); }
  .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
  .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
  .btn-outline:hover { background: var(--primary); color: white; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
  .select-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
  .start-row { text-align: center; }

  /* QUIZ */
  .quiz-container { max-width: 760px; margin: 0 auto; padding: 32px 24px; }
  .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .quiz-meta { font-size: 13px; color: var(--muted); }
  .quiz-meta strong { color: var(--text); }
  .progress-bar { width: 100%; height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 28px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #ff6b6b); border-radius: 3px; transition: width 0.4s ease; }

  .question-card { background: var(--card); border-radius: var(--radius); padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 24px; border: 1px solid var(--border); }
  .q-type-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; }
  .type-mcq { background: #dbeafe; color: #1d4ed8; }
  .type-tf { background: #f3e8ff; color: #7c3aed; }
  .type-short { background: #d1fae5; color: #065f46; }
  .type-scenario { background: #fef3c7; color: #92400e; }

  .q-topic { font-size: 12px; font-weight: 600; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .q-number { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .q-text { font-size: 17px; font-weight: 600; line-height: 1.6; color: var(--text); margin-bottom: 24px; }
  .q-scenario-box { background: #f8fafc; border-left: 4px solid var(--warn); border-radius: 0 8px 8px 0; padding: 14px 16px; margin-bottom: 20px; font-size: 14px; color: #374151; font-style: italic; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.15s; }
  .option:hover { border-color: #93c5fd; background: #f0f9ff; }
  .option.selected { border-color: #3b82f6; background: #eff6ff; }
  .option.correct { border-color: var(--correct); background: #f0fdf4 !important; }
  .option.wrong { border-color: var(--wrong); background: #fef2f2 !important; }
  .option.reveal-correct { border-color: var(--correct); background: #f0fdf4; }
  .option-letter { width: 28px; height: 28px; min-width: 28px; border-radius: 6px; background: var(--bg); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; transition: all 0.15s; }
  .option.selected .option-letter { background: #3b82f6; border-color: #3b82f6; color: white; }
  .option.correct .option-letter { background: var(--correct); border-color: var(--correct); color: white; }
  .option.wrong .option-letter { background: var(--wrong); border-color: var(--wrong); color: white; }
  .option.reveal-correct .option-letter { background: var(--correct); border-color: var(--correct); color: white; }
  .option-text { font-size: 15px; line-height: 1.5; padding-top: 2px; }

  .tf-options { display: flex; gap: 16px; }
  .tf-btn { flex: 1; padding: 16px; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 700; text-align: center; transition: all 0.15s; background: var(--card); }
  .tf-btn:hover { border-color: #93c5fd; background: #f0f9ff; }
  .tf-btn.selected { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
  .tf-btn.correct { border-color: var(--correct); background: #f0fdf4; color: var(--correct); }
  .tf-btn.wrong { border-color: var(--wrong); background: #fef2f2; color: var(--wrong); }
  .tf-btn.reveal-correct { border-color: var(--correct); background: #f0fdf4; color: var(--correct); }

  .short-answer-area { width: 100%; min-height: 100px; padding: 14px; border: 2px solid var(--border); border-radius: 8px; font-size: 15px; font-family: inherit; resize: vertical; transition: border-color 0.15s; }
  .short-answer-area:focus { outline: none; border-color: #3b82f6; }

  .feedback-box { margin-top: 20px; padding: 16px; border-radius: 8px; font-size: 14px; line-height: 1.6; display: none; }
  .feedback-box.show { display: block; }
  .feedback-correct { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
  .feedback-wrong { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
  .feedback-info { background: #eff6ff; border: 1px solid #93c5fd; color: #1d4ed8; }
  .feedback-box strong { display: block; margin-bottom: 4px; font-size: 15px; }

  .quiz-nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .nav-right { display: flex; gap: 10px; }

  /* RESULTS */
  .results-container { max-width: 800px; margin: 0 auto; padding: 32px 24px; }
  .score-card { background: var(--card); border-radius: var(--radius); padding: 40px; text-align: center; margin-bottom: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid var(--border); }
  .score-circle { width: 140px; height: 140px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; font-weight: 800; border: 8px solid; }
  .score-circle .pct { font-size: 38px; }
  .score-circle .label { font-size: 12px; opacity: 0.8; }
  .score-great { border-color: var(--correct); color: var(--correct); background: #f0fdf4; }
  .score-good { border-color: #f59e0b; color: #d97706; background: #fffbeb; }
  .score-low { border-color: var(--wrong); color: var(--wrong); background: #fef2f2; }
  .score-card h2 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
  .score-card p { color: var(--muted); font-size: 15px; }
  .score-stats { display: flex; gap: 16px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
  .stat-pill { padding: 8px 20px; border-radius: 30px; font-size: 14px; font-weight: 600; }
  .stat-correct { background: #d1fae5; color: #065f46; }
  .stat-wrong { background: #fee2e2; color: #991b1b; }
  .stat-skip { background: #f3f4f6; color: var(--muted); }

  .topic-breakdown { background: var(--card); border-radius: var(--radius); padding: 28px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid var(--border); }
  .topic-breakdown h3 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .topic-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; font-size: 14px; }
  .topic-row-name { width: 220px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topic-bar-wrap { flex: 1; height: 10px; background: var(--bg); border-radius: 5px; overflow: hidden; }
  .topic-bar { height: 100%; border-radius: 5px; transition: width 0.6s ease; }
  .topic-row-score { width: 50px; text-align: right; font-weight: 700; }
  .results-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  /* ANSWER KEY */
  .key-container { max-width: 800px; margin: 0 auto; padding: 32px 24px; }
  .key-section { background: var(--card); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid var(--border); }
  .key-section h3 { font-size: 18px; font-weight: 700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--border); color: var(--primary); }
  .key-item { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--bg); }
  .key-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .key-q { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .key-a { font-size: 14px; color: #166534; background: #f0fdf4; padding: 10px 14px; border-radius: 6px; border-left: 3px solid var(--correct); }

  @media (max-width: 600px) {
    .quiz-container, .home-container, .results-container, .key-container { padding: 20px 16px; }
    .q-text { font-size: 15px; }
    .tf-options { flex-direction: column; }
    .topic-row-name { width: 140px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">AEM</div>
  <div>
    <h1>AEM Interview Prep Quiz</h1>
    <p>Adobe Experience Manager · 11 Topics · 165 Questions</p>
  </div>
</div>

<!-- HOME SCREEN -->
<div id="screen-home" class="screen active">
  <div class="home-container">
    <div class="home-hero">
      <div class="badge">🎯 Interview Preparation</div>
      <h2>AEM Developer Quiz</h2>
      <p>Test your knowledge across 11 core AEM topics. Choose topics below and start your quiz.</p>
    </div>
    <div class="select-actions">
      <button class="btn btn-secondary" onclick="selectAll()">✓ Select All Topics</button>
      <button class="btn btn-secondary" onclick="selectNone()">✕ Deselect All</button>
    </div>
    <div class="topic-grid" id="topicGrid"></div>
    <div class="start-row">
      <button class="btn btn-primary" id="startBtn" onclick="startQuiz()">
        ▶ Start Quiz &nbsp;<span id="startCount">(0 topics selected)</span>
      </button>
    </div>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="screen-quiz" class="screen">
  <div class="quiz-container">
    <div class="quiz-header">
      <div class="quiz-meta">Topic: <strong id="quizTopicLabel"></strong></div>
      <div class="quiz-meta">Question <strong id="qCurrent">1</strong> of <strong id="qTotal">0</strong></div>
      <button class="btn btn-secondary" onclick="goHome()" style="padding:8px 16px;font-size:13px;">⬅ Exit</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="question-card" id="questionCard"></div>
    <div class="quiz-nav">
      <button class="btn btn-secondary" id="btnPrev" onclick="prevQ()">← Previous</button>
      <div class="nav-right">
        <button class="btn btn-secondary" id="btnSkip" onclick="skipQ()">Skip →</button>
        <button class="btn btn-primary" id="btnNext" onclick="nextQ()">Next →</button>
      </div>
    </div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="screen-results" class="screen">
  <div class="results-container">
    <div class="score-card" id="scoreCard"></div>
    <div class="topic-breakdown" id="topicBreakdown"></div>
    <div class="results-actions">
      <button class="btn btn-primary" onclick="restartQuiz()">🔁 Retake Quiz</button>
      <button class="btn btn-outline" onclick="showAnswerKey()">📋 View Answer Key</button>
      <button class="btn btn-secondary" onclick="goHome()">🏠 Home</button>
    </div>
  </div>
</div>

<!-- ANSWER KEY SCREEN -->
<div id="screen-key" class="screen">
  <div class="key-container">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
      <div><h2 style="font-size:24px;font-weight:800;">Answer Key</h2><p style="color:var(--muted);font-size:14px;">Full explanations for all selected topics</p></div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-secondary" onclick="showScreen('screen-results')">← Results</button>
        <button class="btn btn-secondary" onclick="goHome()">🏠 Home</button>
      </div>
    </div>
    <div id="answerKeyContent"></div>
  </div>
</div>

<script>
// ─── QUESTION DATA ────────────────────────────────────────────────────────────
const TOPICS = [
  {
    id: "sling-models",
    name: "Sling Models",
    icon: "1",
    desc: "Annotations, injection, adaptables",
    questions: [
      { type:"mcq", q:"Which annotation is used to declare a Java class as a Sling Model?", opts:["@Component","@Model","@SlingServlet","@Service"], ans:1, exp:"@Model (from org.apache.sling.models.annotations) marks a class as a Sling Model and specifies its adaptables." },
      { type:"mcq", q:"Which annotation injects the value of a JCR property directly into a Sling Model field?", opts:["@Inject","@ValueMapValue","@ChildResource","@OSGiService"], ans:1, exp:"@ValueMapValue injects a property from the resource's ValueMap, optionally with a custom name via the 'name' attribute." },
      { type:"mcq", q:"What does the 'adaptables' attribute in @Model define?", opts:["The OSGi services the model uses","What types the model can be adapted from","The JCR node types the model supports","The Sling resource types supported"], ans:1, exp:"adaptables specifies which types (e.g., Resource.class, SlingHttpServletRequest.class) can be adapted to this model." },
      { type:"mcq", q:"Which annotation injects a child resource node into a Sling Model field?", opts:["@ValueMapValue","@Self","@ChildResource","@RequestAttribute"], ans:2, exp:"@ChildResource injects a child Resource or adapts it to another Sling Model automatically." },
      { type:"mcq", q:"What happens during injection if a required field cannot be injected and defaultInjectionStrategy is REQUIRED?", opts:["The field is set to null","The model adaptation returns null","An exception is logged but model is returned","The page fails to render with 500"], ans:1, exp:"If a required injection fails, the entire adaptation returns null, preventing partially initialized models." },
      { type:"mcq", q:"Which annotation marks a method to be called after all injections are complete?", opts:["@Activate","@Modified","@PostConstruct","@Init"], ans:2, exp:"@PostConstruct (javax.annotation) marks a method to execute after all dependency injections are done — ideal for derived field computation." },
      { type:"mcq", q:"Which annotation is used to inject an OSGi service into a Sling Model?", opts:["@Reference","@OSGiService","@Inject","@Service"], ans:1, exp:"@OSGiService injects an OSGi service reference directly into a Sling Model field." },
      { type:"mcq", q:"What interface must a Sling Model implement to be exported as JSON via the Sling Model Exporter?", opts:["Exportable","Serializable","AdaptTo","JsonNode"], ans:0, exp:"The class must be annotated with @Exporter (e.g., name='jackson') and can implement a marker — the exporter serializes fields automatically." },
      { type:"mcq", q:"Which annotation injects the current SlingHttpServletRequest into a Sling Model?", opts:["@Inject","@Self","@RequestAttribute","@SlingObject"], ans:1, exp:"@Self injects the adaptable itself — if the adaptable is SlingHttpServletRequest, you get the request object." },
      { type:"mcq", q:"What is the purpose of the 'via' attribute in Sling Model injection annotations?", opts:["Specifies the injector to use","Defines the child resource path","Sets a default value","Specifies an alternate resource to inject from"], ans:0, exp:"The 'via' attribute selects a specific injector strategy, e.g., @Via(type = ResourceSuperType.class) to delegate to a parent resource type." },
      { type:"tf", q:"A Sling Model class must implement a specific interface to be used as a model.", ans:false, exp:"Sling Models do not need to implement any interface. They can be plain POJOs annotated with @Model, though implementing an interface is a best practice." },
      { type:"tf", q:"The @Inject annotation can resolve child resources, OSGi services, request attributes, and property values depending on context.", ans:true, exp:"@Inject is a generic injector that tries all registered injectors in priority order until one succeeds." },
      { type:"tf", q:"Sling Models support adaptation from both Resource and SlingHttpServletRequest objects.", ans:true, exp:"You can specify multiple adaptables: @Model(adaptables={Resource.class, SlingHttpServletRequest.class})" },
      { type:"short", q:"Explain the difference between @Inject and @ValueMapValue in a Sling Model. When would you prefer one over the other?", ans:"@Inject is a generic annotation that tries all available injectors (ValueMap, OSGi, child resources, etc.) in priority order. @ValueMapValue is specific — it only injects from the resource's ValueMap (JCR properties). Use @ValueMapValue for explicit, unambiguous property injection (better performance, clearer intent). Use @Inject when you want the framework to figure out the source automatically." },
      { type:"scenario", q:"You need to create a Sling Model for a 'Card' component that reads a 'title' property and a 'link/url' child node property. The model must also call a TagManager service. Describe the key annotations you would use.", scenario:"Component structure: /content/mysite/en/home/jcr:content/card with properties title (String) and a child node 'link' containing property 'url'.", ans:"Use @Model(adaptables=Resource.class). Annotate the class with @Model. Inject 'title' with @ValueMapValue. Inject the child link node with @ChildResource (creates a sub-model or Resource). Inject TagManager with @OSGiService. Use a @PostConstruct method to derive any computed values from the link child resource (e.g., read its 'url' property via childResource.getValueMap())." }
    ]
  },
  {
    id: "sightly",
    name: "Sightly / HTL",
    icon: "2",
    desc: "HTML Template Language, expressions, use-API",
    questions: [
      { type:"mcq", q:"What does HTL stand for in AEM?", opts:["Highly Typed Language","HTML Template Language","Hybrid Template Loader","HyperText Logic"], ans:1, exp:"HTL (HTML Template Language) is AEM's preferred server-side templating language, formerly known as Sightly." },
      { type:"mcq", q:"Which HTL attribute is used to iterate over a collection?", opts:["data-sly-repeat","data-sly-list","data-sly-loop","data-sly-forEach"], ans:1, exp:"data-sly-list iterates over a collection. The loop variable is accessed as 'item' and loop status as 'itemList' by default." },
      { type:"mcq", q:"Which HTL block statement conditionally renders an element?", opts:["data-sly-if","data-sly-when","data-sly-condition","data-sly-show"], ans:0, exp:"data-sly-test evaluates a condition and removes the element (and its children) if false. 'data-sly-if' is not standard — the correct one is data-sly-test." },
      { type:"mcq", q:"How do you include another HTL script in HTL?", opts:["data-sly-include","data-sly-resource","data-sly-call","data-sly-import"], ans:0, exp:"data-sly-include includes another HTL/JSP script in the same rendering context. data-sly-resource includes a Sling resource (dispatches a sub-request)." },
      { type:"mcq", q:"What is the correct syntax to access a Sling Model named 'model' in HTL via the Use API?", opts:["<sly data-sly-use.model='${model}'/>","<sly data-sly-use.model='com.example.Model'/>","<sly data-sly-bind='com.example.Model'/>","<sly data-sly-ref='com.example.Model'/>"], ans:1, exp:"data-sly-use.identifier='fully.qualified.ClassName' instantiates the class and binds it to 'identifier' for use in the template." },
      { type:"mcq", q:"In HTL, how do you output a property value with XSS protection for HTML context?", opts:["${properties.title}","${properties.title @ context='html'}","${xss:filter(properties.title)}","${Text.filter(properties.title)}"], ans:0, exp:"${properties.title} automatically applies XSS escaping appropriate for the context (HTML by default). The context attribute can override this." },
      { type:"mcq", q:"Which HTL statement is used to define and call a reusable template block?", opts:["data-sly-include","data-sly-template / data-sly-call","data-sly-resource","data-sly-use"], ans:1, exp:"data-sly-template defines a reusable template block and data-sly-call invokes it, optionally passing parameters." },
      { type:"mcq", q:"What does data-sly-unwrap do?", opts:["Removes the element's children","Renders the element's children without the wrapping HTML element","Removes the element from DOM conditionally","Escapes the element's output"], ans:1, exp:"data-sly-unwrap renders only the children of the element, stripping the wrapping tag itself from output." },
      { type:"mcq", q:"How do you pass a parameter to a data-sly-call template?", opts:["As HTML attributes on the caller","As a map using @ syntax: data-sly-call='${myTemplate @ param=value}'","Via data attributes on the template element","Through the Sling request parameters"], ans:1, exp:"Parameters are passed using the @ operator: <sly data-sly-call='${myTemplate @ title=properties.title}'/>" },
      { type:"mcq", q:"What is the purpose of the 'wcmmode' object available in HTL?", opts:["Checks the current locale","Determines the current WCM mode (edit, preview, disabled)","Provides access to page properties","Manages component dialog data"], ans:1, exp:"The wcmmode global object exposes methods like wcmmode.edit, wcmmode.preview, wcmmode.disabled to conditionally render author-only markup." },
      { type:"tf", q:"HTL supports Java scriptlets (inline Java code) similar to JSP.", ans:false, exp:"HTL explicitly prohibits inline Java code. Business logic must be placed in Use-API classes (POJOs, Sling Models) and referenced via data-sly-use." },
      { type:"tf", q:"The 'currentPage' object is available globally in HTL without any additional declaration.", ans:true, exp:"AEM exposes several global objects in HTL including currentPage, currentNode, properties, pageProperties, resource, request, response, etc." },
      { type:"tf", q:"data-sly-resource dispatches a separate Sling request to render an included resource.", ans:true, exp:"data-sly-resource performs a Sling include (sub-request dispatch) for the specified resource path or sub-resource, unlike data-sly-include which just includes a script." },
      { type:"short", q:"What is XSS context in HTL and why is it important? Name at least three context types.", ans:"HTL automatically escapes output based on the context where it appears. Context types include: 'html' (default, HTML-encodes special chars), 'attribute' (for HTML attribute values), 'uri' (for URLs, prevents javascript: injection), 'scriptString' (inside JavaScript strings), 'styleToken' (inside CSS), 'unsafe' (no escaping — use only when absolutely necessary). This prevents Cross-Site Scripting attacks by ensuring values are always escaped appropriately for their rendering context." },
      { type:"scenario", q:"You are building a component that renders a navigation list. Each nav item has a label, URL, and should be marked 'active' if it matches the current page. How would you structure the HTL template?", scenario:"Data is provided by a Sling Model 'NavModel' with a List<NavItem> getItems() method. Each NavItem has getLabel(), getUrl(), and isActive() methods.", ans:"<sly data-sly-use.nav='com.example.NavModel'/>\\n<nav>\\n  <ul data-sly-list.item='${nav.items}'>\\n    <li class='${'active' @ context='attribute', condition=item.active}'>\\n      <a href='${item.url @ context='uri'}'>${item.label}</a>\\n    </li>\\n  </ul>\\n</nav>\\nKey points: use data-sly-use to reference the model, data-sly-list to iterate, correct context hints for URL and attribute values, and a ternary expression for the active class." }
    ]
  },
  {

      { type:"mcq", q:"Where are Editable Templates stored in the JCR?", opts:["/apps/settings/wcm/templates","/conf/<config>/settings/wcm/templates","/content/templates","/libs/wcm/core/templates"], ans:1, exp:"Editable Templates are stored under /conf/<config-name>/settings/wcm/templates/ (in the configuration-aware location)." },
      { type:"mcq", q:"Which node type defines the allowed components and layout policy for an Editable Template?", opts:["jcr:content","structure","policies","initial"], ans:2, exp:"The 'policies' node under the template maps container/component nodes to policy definitions that control which components are allowed." },
      { type:"mcq", q:"What is the purpose of the 'initial' node in an Editable Template?", opts:["Defines the locked structure of the page","Provides default content copied into new pages created from the template","Stores the component policies","Contains the thumbnail of the template"], ans:1, exp:"The 'initial' node contains default content that is copied into the editable area of a new page when it is first created." },
      { type:"mcq", q:"What is the purpose of the 'structure' node in an Editable Template?", opts:["Stores page policies","Defines layout containers and locked components that cannot be changed by page authors","Contains initial content for pages","Holds template metadata"], ans:1, exp:"The 'structure' node defines the fixed, locked layout. Authors cannot remove or move structure-level components; only template authors can edit them." },
      { type:"mcq", q:"Which user group can edit the structure of an Editable Template?", opts:["Content Authors","Template Editors / Template Authors","Administrators only","Developers"], ans:1, exp:"Template Editors (or Template Authors) have permission to modify template structure, policies, and initial content via the Template Editor UI." },
      { type:"mcq", q:"How do you associate an Editable Template configuration with a content path?", opts:["Via the template's sling:resourceType","Via the Cloud Configuration (cq:conf property on the content node)","In the page component's dialog","Via OSGi configuration"], ans:1, exp:"The cq:conf property on a content node (e.g., /content/mysite) or its ancestor points to the /conf path, making templates in that conf available." },
      { type:"mcq", q:"What differentiates a locked component from an unlocked component in an Editable Template?", opts:["Locked components use a different resource type","Locked components have editable=false and cannot be modified by page authors","Locked components are hidden in edit mode","Locked components require admin access to view"], ans:1, exp:"Locked components (cq:isLocked=true or editable=false) in the structure are inherited by all pages but cannot be edited by content authors." },
      { type:"mcq", q:"What is a Template Policy in Editable Templates?", opts:["A security policy for template access","A set of design configuration properties (allowed components, styles) associated with a component/container","A JCR ACL rule for template usage","A workflow to approve template creation"], ans:1, exp:"Template Policies define allowed components, style configurations, and design data for a component or container, stored under /conf/…/settings/wcm/policies." },
      { type:"mcq", q:"How can you allow specific components in a Layout Container within an Editable Template?", opts:["Add them to the template's allowed component list in design mode","Configure the policy for that container to include the desired component groups","Edit the parsys node directly in CRXDE","Modify the component's sling:resourceType"], ans:1, exp:"In the Template Editor, select the container, open its policy, and under 'Allowed Components' add the desired component groups or specific components." },
      { type:"mcq", q:"Which AEM feature replaced Static Templates as the preferred approach for template creation?", opts:["Page Templates","Editable Templates","Experience Templates","Blueprint Templates"], ans:1, exp:"Editable Templates (introduced in AEM 6.2) replaced Static Templates, offering a UI-driven, flexible approach without requiring developer intervention for every template." },
      { type:"tf", q:"Editable Templates allow content authors to directly modify the template structure.", ans:false, exp:"Content authors can only edit page content. Only Template Editors/Authors can modify the template structure, initial content, and policies." },
      { type:"tf", q:"A single Editable Template can be used across multiple sites in AEM.", ans:true, exp:"If the /conf configuration is accessible from multiple content paths (via cq:conf inheritance), the same template can be reused across sites." },
      { type:"tf", q:"Editable Templates store design data separately from page content, unlike Static Templates.", ans:true, exp:"Editable Templates store policies (design data) in /conf, cleanly separated from /content — unlike Static Templates which stored design in /etc/designs." },
      { type:"short", q:"Explain the three main sections of an Editable Template (Structure, Initial Content, Layout) and what each one controls.", ans:"1. Structure: Defines the fixed layout visible on all pages. Locked components cannot be modified by authors. Template editors define headers, footers, and fixed containers here. 2. Initial Content: Provides editable default content pre-populated when a new page is created from the template. Authors can change or remove this content. 3. Layout: Controls the responsive grid breakpoints and column configurations for layout containers, allowing responsive layout rules to be set at the template level." },
      { type:"scenario", q:"You need to create a new template for a 'Landing Page' in AEM. The header and footer must be locked (not editable by content authors), but the main content area must be fully editable. How would you configure this?", scenario:"Using the AEM Template Editor, you have access to Structure, Initial Content, and Layout modes.", ans:"In Structure mode: Add the header component and footer component to the template, then lock them (toggle the lock icon). Add a Layout Container in the main content area and leave it unlocked. Set the container's policy to allow the desired component groups. In Initial Content mode: Add placeholder content if needed in the unlocked container. In Layout mode: Configure responsive grid breakpoints for the container. The result: header/footer are inherited and immutable on pages, while the main container is fully author-editable." }

  },
  {
    id: "core-components",
    name: "Core Components",
    icon: "4",
    desc: "Extension, override, proxy, delegation",
    questions: [
      { type:"mcq", q:"What is the recommended way to customize a Core Component in AEM?", opts:["Edit the component directly in /libs","Create a proxy component in /apps that overlays the core component","Fork the Core Component source code","Use design mode to change settings"], ans:1, exp:"Create a proxy component in /apps with sling:resourceSuperType pointing to the core component. This follows the proxy pattern and leverages Sling inheritance." },
      { type:"mcq", q:"What JCR property enables Sling Resource Merger / inheritance from a parent resource type?", opts:["sling:resourceType","sling:resourceSuperType","cq:inherit","jcr:primaryType"], ans:1, exp:"sling:resourceSuperType on a component node defines the parent component, enabling overlay/inheritance of scripts and dialogs via Sling Resource Merger." },
      { type:"mcq", q:"Where should proxy components for Core Components be created?", opts:["/libs/core/wcm/components","/apps/<project>/components","/conf/<project>/components","/content/components"], ans:1, exp:"All custom and proxy components should live under /apps/<project-name>/components/ — never modify /libs directly." },
      { type:"mcq", q:"What is the purpose of the Delegation Pattern when extending Core Component Sling Models?", opts:["To forward HTTP requests to another servlet","To delegate Sling Model method calls to the core component's model implementation","To copy core component JCR nodes","To override OSGi service implementations"], ans:1, exp:"The Delegation Pattern uses @Self @Via(type=ResourceSuperType.class) to inject and delegate to the parent (core) Sling Model, allowing you to add/override only specific methods." },
      { type:"mcq", q:"Which Maven artifact provides AEM Core Components as a project dependency?", opts:["com.adobe.cq:core.wcm.components.core","org.apache.sling:org.apache.sling.models.api","com.day.cq:cq-wcm-core","com.adobe.aem:uber-jar"], ans:0, exp:"The core.wcm.components.core artifact provides the Core Components interfaces and Sling Models that you can use for delegation." },
      { type:"mcq", q:"How do you override only the HTL rendering script of a Core Component without touching its Sling Model?", opts:["Create a script with the same name in the proxy component folder","Edit the script in /libs/core/wcm/components","Override the sling:resourceType in the component dialog","Modify the component's featureflags"], ans:0, exp:"Because of Sling Resource Merger and sling:resourceSuperType, AEM first looks in your proxy component's folder. Placing a script with the same filename there overrides it." },
      { type:"mcq", q:"What annotation pair is used for the Delegation Pattern in a Sling Model extending a Core Component model?", opts:["@Self and @SlingObject","@Self @Via(type=ResourceSuperType.class) and @Delegate","@Inject and @Source","@ChildResource and @OSGiService"], ans:1, exp:"@Self @Via(type=ResourceSuperType.class) injects the core component model adapted from the parent resource type. WCMUsePojo delegation uses @Delegate on that field." },
      { type:"mcq", q:"Which Core Component allows authors to create multi-column responsive layouts on a page?", opts:["Teaser","Carousel","Layout Container","Content Fragment"], ans:2, exp:"The Layout Container (wcm/foundation/components/responsivegrid) provides the responsive grid for authoring multi-column layouts with breakpoint control." },
      { type:"mcq", q:"What is the 'wcm/core/components/commons/v1/templates/page' component used for?", opts:["It is the base page component","It is a template component","It provides the basic HTL page rendering structure","It is the parsys component"], ans:2, exp:"Core Components provides a base page component (core/wcm/components/page/v2/page) that can be extended for project-specific page implementations." },
      { type:"mcq", q:"How can you add a new tab to the dialog of a Core Component without duplicating the entire dialog?", opts:["Use sling:resourceMergeChildren to merge dialog nodes","Copy the dialog from /libs and add a new tab","Modify the cq:dialog in /libs directly","Use an OSGi overlay factory"], ans:0, exp:"Sling Resource Merger allows you to add sling:resourceMergeChildren=true on your proxy's cq:dialog to merge with the parent dialog, adding only the new nodes." },
      { type:"tf", q:"You should directly edit Core Component files under /libs to customize their behavior.", ans:false, exp:"Editing /libs is strongly discouraged as upgrades will overwrite changes. Always overlay/proxy components in /apps." },
      { type:"tf", q:"A proxy component inherits the dialog of its parent core component automatically.", ans:true, exp:"Via sling:resourceSuperType, Sling Resource Merger automatically inherits the dialog, edit config, and scripts from the parent component unless overridden." },
      { type:"tf", q:"The Core Components library can be embedded in a project using the AEM archetype.", ans:true, exp:"The AEM project archetype includes Core Components as a dependency and embeds them in the all package, making them available on the AEM instance." },
      { type:"short", q:"What is the difference between overlaying and extending (proxy) a Core Component? Which approach is recommended and why?", ans:"Overlay: Copies the component to /apps mirroring the /libs structure path. Completely replaces the original — no inheritance. Risky as you own the full implementation and lose core component updates. Extension/Proxy: Creates a new component in /apps/project/components with sling:resourceSuperType pointing to the core component. Inherits all scripts, dialogs, and Sling Models unless explicitly overridden. Recommended because: you only override what you need, Core Component updates are inherited, and maintenance is significantly easier." },
      { type:"scenario", q:"You need to extend the Core Text component to add a custom 'disclaimer' field. Describe step-by-step how you would implement this without duplicating the entire component.", scenario:"Core Text component: core/wcm/components/text/v2/text. You need an extra 'disclaimer' text field in the dialog and it should be rendered below the main text.", ans:"1. Create proxy component at /apps/myproject/components/text with sling:resourceSuperType=core/wcm/components/text/v2/text. 2. Add a cq:dialog node with sling:resourceMergeChildren=true, add only the new 'disclaimer' tab/field node. 3. Create a Sling Model MyTextModel extending the core TextModel using delegation (@Self @Via(ResourceSuperType.class)). Add getDisclaimer() method that reads the 'disclaimer' property. 4. Create text.html in the proxy folder — include the delegated core rendering via data-sly-resource pointing to the supertype, then add <p>${model.disclaimer}</p> below. 5. Update the component policy to allow it in templates." }
    ]
  },
  {
    id: "client-libs",
    name: "Client Libraries",
    icon: "5",
    desc: "Creation, categories, debugging, minification",
    questions: [
      { type:"mcq", q:"What node type is used to create a Client Library in AEM?", opts:["cq:Page","cq:ClientLibraryFolder","nt:folder","sling:Folder"], ans:1, exp:"cq:ClientLibraryFolder is the node type for Client Libraries. It contains js.txt and css.txt files that list the included scripts." },
      { type:"mcq", q:"Which property on a Client Library node defines its category?", opts:["sling:resourceType","categories","clientlib.name","jcr:title"], ans:1, exp:"The 'categories' property (String or String[]) on the cq:ClientLibraryFolder node defines the category name(s) used to include the library in pages." },
      { type:"mcq", q:"Which HTL global object is used to include a client library category on a page?", opts:["wcmmode","clientlibs","headlibs","pageProperties"], ans:1, exp:"The 'clientlibs' global object provides methods like clientlibs.css, clientlibs.js to include libraries: <sly data-sly-use.clientlibs='${...}' data-sly-call='${clientlibs.all @ categories=[\"mycat\"]}'/>" },
      { type:"mcq", q:"What is the purpose of the 'dependencies' property on a Client Library?", opts:["Lists Maven dependencies","Specifies client library categories that must load before this library","Defines required OSGi bundles","Sets the library load order within the same page"], ans:1, exp:"The 'dependencies' property ensures specified client library categories are loaded first, handling load order without manual sequencing." },
      { type:"mcq", q:"Which URL parameter can you append to any AEM page URL to disable client library minification for debugging?", opts:["?debug=layout","?debugClientLibs=true","?clientlibs=debug","?minify=false"], ans:1, exp:"Appending ?debugClientLibs=true disables minification and serves libraries as individual unminified files, making debugging much easier." },
      { type:"mcq", q:"What is the 'embed' property used for in Client Libraries?", opts:["To embed images as base64","To include other client library categories' content inline within this library","To embed the library in a component JAR","To bundle multiple pages' scripts together"], ans:1, exp:"The 'embed' property merges the content of specified library categories directly into this library's output, reducing HTTP requests." },
      { type:"mcq", q:"Where is the AEM Client Library Manager available for debugging library issues?", opts:["/system/console/components","/libs/granite/ui/content/dumplibs","/crx/de/index.jsp","/system/console/bundles"], ans:1, exp:"The Dump Libraries page at /libs/granite/ui/content/dumplibs.html shows all registered client libraries, their categories, paths, and dependencies." },
      { type:"mcq", q:"What file within a Client Library folder lists the CSS files to be included?", opts:["styles.txt","files.css","css.txt","clientlib.json"], ans:2, exp:"css.txt lists the CSS files (paths relative to the clientlib folder) to be included, in order. Similarly js.txt lists JavaScript files." },
      { type:"mcq", q:"What does the 'allowProxy' property do on a Client Library?", opts:["Allows the library to be served through the Dispatcher","Makes the library accessible via /etc.clientlibs/ proxy path for publish-side security","Enables the library on proxy author environments","Allows cross-site library references"], ans:1, exp:"allowProxy=true makes the library accessible via /etc.clientlibs/ (proxied path) instead of /apps/, which Dispatcher typically blocks. Required for publish." },
      { type:"mcq", q:"Which AEM Felix console tool lets you rebuild and invalidate client library caches?", opts:["OSGi Configuration Console","Sling Resource Resolver Console","CQ HTML Library Manager (/libs/granite/ui/content/dumplibs)","Adobe Granite HTML Library Manager config"], ans:3, exp:"The Adobe Granite HTML Library Manager OSGi configuration controls minification, debug mode, and gzipping. You can also use the dumplibs page to rebuild libraries." },
      { type:"tf", q:"Client Libraries with allowProxy=false can be served on AEM Publish via /apps/ paths.", ans:false, exp:"Dispatcher typically blocks /apps/ paths on Publish. allowProxy=true is required so the library is accessible via /etc.clientlibs/ which Dispatcher allows." },
      { type:"tf", q:"A client library can belong to multiple categories simultaneously.", ans:true, exp:"The 'categories' property accepts a multi-value String array, so a single clientlib can be included under multiple category names." },
      { type:"tf", q:"CSS and JS files within a clientlib are automatically minified in production by default in AEM.", ans:true, exp:"AEM's HTML Library Manager minifies and combines clientlib files in production mode. Debug mode or the OSGi configuration can disable this." },
      { type:"short", q:"A developer notices that JavaScript changes are not appearing on the publish server even after replication. What are the typical troubleshooting steps for client library issues?", ans:"1. Check if the clientlib is rebuilt: visit /libs/granite/ui/content/dumplibs.rebuild.html and rebuild. 2. Check browser cache — hard refresh (Ctrl+Shift+R). 3. Verify the category name matches exactly what's referenced in HTL. 4. Check allowProxy=true is set for publish access. 5. Verify the file is listed in js.txt. 6. Check Dispatcher cache — may need to flush /etc.clientlibs/ cached files. 7. Use ?debugClientLibs=true to see individual files. 8. Check browser console for 404 errors on script URLs." },
      { type:"scenario", q:"You have two client libraries — one for global site styles (category: 'mysite.base') and one for a specific component (category: 'mysite.carousel'). The carousel JS depends on the base CSS. How do you configure this and include them on a page?", scenario:"The base clientlib is at /apps/mysite/clientlibs/base and carousel clientlib at /apps/mysite/clientlibs/carousel.", ans:"On the carousel clientlib node (/apps/mysite/clientlibs/carousel): set dependencies=['mysite.base'] to ensure base loads first. In the page component HTL (or base page template), include both: <sly data-sly-use.clientlibs='${...}' data-sly-call='${clientlibs.css @ categories=[\"mysite.base\",\"mysite.carousel\"]}'/> and <sly data-sly-call='${clientlibs.js @ categories=[\"mysite.base\",\"mysite.carousel\"]}'/> in the appropriate head/body sections. Set allowProxy=true on both for publish access." }
    ]
  },
  {
    id: "run-modes",
    name: "Run Modes",
    icon: "6",

    questions: [
      { type:"mcq", q:"Which of the following is NOT a default AEM run mode?", opts:["author","publish","nosamplecontent","development"], ans:3, exp:"'development' is not a default AEM run mode. The default run modes include author, publish, nosamplecontent, and samplecontent. Custom run modes like dev/staging/prod are defined by operators." },
      { type:"mcq", q:"How do you specify a custom run mode when starting AEM?", opts:["Add it to the crx-quickstart/install folder","Pass -r <runmode> as a JVM argument or use the sling.run.modes property","Edit the AEM license file","Configure it in the Felix OSGi console"], ans:1, exp:"Custom run modes are specified via the -r flag (e.g., java -jar aem.jar -r author,dev) or the sling.run.modes system property." },
      { type:"mcq", q:"Where should run-mode-specific OSGi configuration files be placed?", opts:["/apps/system/config.<runmode>","/crx-quickstart/install.<runmode>","/conf/global/config.<runmode>","Both A and B"], ans:3, exp:"Run-mode-specific configs can be placed in: /apps/.../config.<runmode>/ (in the repository) OR /crx-quickstart/install.<runmode>/ (file system). Both are valid." },
      { type:"mcq", q:"What is the naming convention for an OSGi config file specific to the 'author' run mode?", opts:["com.example.MyService.cfg","com.example.MyService.author.cfg","com.example.MyService.config in config.author folder","Both B and C"], ans:3, exp:"You can either name the file com.example.MyService~author.cfg (tilde notation) OR place com.example.MyService.cfg inside a config.author/ folder." },
      { type:"mcq", q:"Which API can you use to programmatically check the current run modes in Java?", opts:["SlingSettingsService","RunModeService","SlingRunModeManager","ResourceResolver"], ans:0, exp:"SlingSettingsService (org.apache.sling.settings.SlingSettingsService) exposes getRunModes() which returns the Set of active run modes." },
      { type:"mcq", q:"Can multiple custom run modes be active simultaneously on an AEM instance?", opts:["No, only one run mode is active at a time","Yes, multiple run modes can be active simultaneously","Only if they don't conflict with each other","Only in author mode"], ans:1, exp:"Multiple run modes are active simultaneously (e.g., author + dev + us-region). OSGi configs matching any active mode combination are applied." },
      { type:"mcq", q:"What happens when an AEM instance has run modes 'author' and 'dev' active, and there is a config file in both config.author/ and config.dev/?", opts:["Only the author config applies","Only the dev config applies","Both configs are applied; the more specific one wins on conflicts","They are merged with dev taking precedence"], ans:2, exp:"AEM applies all configs for active run modes. If the same property is configured in both, more specific (or later-loaded) configurations win. Order and specificity matter." },
      { type:"mcq", q:"What is the main purpose of run modes in AEM?", opts:["To control page publication workflows","To define environment-specific configurations without code changes","To set up replication agents","To control dispatcher caching rules"], ans:1, exp:"Run modes allow different OSGi configurations, content, and behavior for different environments (dev/staging/prod, author/publish) without changing code." },
      { type:"mcq", q:"Which folder in the repository is the standard location for run-mode-specific OSGi configurations?", opts:["/etc/config","apps/<project>/osgiconfig/config.<runmode>","apps/<project>/config.<runmode>","Both B and C"], ans:3, exp:"Both /apps/<project>/osgiconfig/config.<runmode>/ and /apps/<project>/config.<runmode>/ are common conventions. The AEM archetype uses config.<runmode>/ under the ui.config module." },
      { type:"mcq", q:"Which run mode determines the AEM instance's role as content editor vs. content delivery?", opts:["primary/secondary","master/slave","author/publish","creator/consumer"], ans:2, exp:"'author' run mode indicates an authoring instance (content editing) and 'publish' indicates a delivery instance (serving content to end users)." },
      { type:"tf", q:"The run mode of an AEM instance can be changed at runtime through the Felix console.", ans:false, exp:"Run modes are set at startup and cannot be changed at runtime. They are determined by JVM arguments, system properties, or the instance name at startup." },
      { type:"tf", q:"Run-mode-specific content can be pre-installed by placing it in install.<runmode> folders.", ans:true, exp:"Content packages placed in /crx-quickstart/install.<runmode>/ are automatically installed only when that run mode is active." },
      { type:"tf", q:"An AEM instance can have both 'author' and 'publish' run modes active at the same time.", ans:false, exp:"Author and publish are mutually exclusive run modes — an instance is either an author or a publish server, not both." },
      { type:"short", q:"Explain how you would configure a Replication Agent that only exists on author instances using run-mode-specific OSGi configuration.", ans:"Create the OSGi configuration file for the replication agent under apps/<project>/config.author/ folder. This ensures the configuration is only deployed and active when the 'author' run mode is active. On publish instances, the configuration won't be applied because 'author' is not in their active run modes. Additionally, replication agents themselves are typically stored in /etc/replication/agents.author/ in the JCR, which is a path pattern that AEM only makes active on author." },
      { type:"scenario", q:"Your project has three environments: local dev, staging, and production. Each needs a different log level for a custom OSGi service. How would you structure the configuration files?", scenario:"Custom run modes: dev, staging, prod. OSGi service: com.example.MyService. Property: loglevel (DEBUG/WARN/ERROR)", ans:"Define custom run modes: dev, staging, prod (activated at startup via -r author,dev etc.). Create config files: 1. /apps/myproject/config/com.example.MyService.cfg (default, no run mode). 2. /apps/myproject/config.dev/com.example.MyService.cfg with loglevel=DEBUG. 3. /apps/myproject/config.staging/com.example.MyService.cfg with loglevel=WARN. 4. /apps/myproject/config.prod/com.example.MyService.cfg with loglevel=ERROR. The run-mode-specific file overrides the default. Combine with environment run mode: -r publish,prod activates the prod config on the publish instance." }
    ]
  },
