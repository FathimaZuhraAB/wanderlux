import React, { useState, useMemo, useEffect, useCallback } from "react";
import { Sparkles } from "lucide-react";

import Ticker from "./components/Ticker";
import Masthead from "./components/Masthead";
import SearchBar from "./components/SearchBar";
import StatsStrip from "./components/StatsStrip";
import FilterPanel from "./components/FilterPanel";
import ProductRow from "./components/ProductRow";
import Methodology from "./components/Methodology";
import Footer from "./components/Footer";

import { fetchSites, searchProducts } from "./lib/api";
import { inr, timeAgo } from "./lib/format";

export default function App() {
  // === server state ===
  const [sites, setSites] = useState([]);
  const [results, setResults] = useState(null);     // SearchResponse | null
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  // === user input state ===
  const [query, setQuery] = useState("iphone 15");
  const [activeCat, setActiveCat] = useState("all");
  const [selectedSites, setSelectedSites] = useState(new Set());
  const [priceRange, setPriceRange] = useState([0, 100000]);
  const [minRating, setMinRating] = useState(0);
  const [sortBy, setSortBy] = useState("price_asc");
  const [showFilters, setShowFilters] = useState(false);
  const [watchlist, setWatchlist] = useState(new Set());
  const [expanded, setExpanded] = useState(null);

  // --- bootstrap: load site list & run an initial search ---
  useEffect(() => {
    fetchSites()
      .then((s) => {
        setSites(s);
        setSelectedSites(new Set(s.map((x) => x.id)));
      })
      .catch((e) => setError("Backend unreachable — is the FastAPI server running on :8000?"));
  }, []);

  const runSearch = useCallback(async () => {
    if (!query.trim()) return;
    setLoading(true);
    setError(null);
    try {
      const data = await searchProducts({
        query: query.trim(),
        sites: selectedSites.size === sites.length ? null : Array.from(selectedSites),
      });
      setResults(data);
    } catch (e) {
      setError(e.message || "Search failed");
    } finally {
      setLoading(false);
    }
  }, [query, selectedSites, sites.length]);

  // first search after sites load
  useEffect(() => {
    if (sites.length > 0 && !results) runSearch();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [sites.length]);

  // === client-side derived view (filters + sort) ===
  const products = useMemo(() => {
    if (!results) return [];
    let out = results.products.map((p) => {
      const visible = p.listings.filter(
        (l) =>
          selectedSites.has(l.site_id) &&
          l.price >= priceRange[0] &&
          l.price <= priceRange[1] &&
          (l.rating == null || l.rating >= minRating) &&
          l.in_stock
      );
      const prices = visible.map((l) => l.price);
      const min = prices.length ? Math.min(...prices) : null;
      const max = prices.length ? Math.max(...prices) : null;
      return { ...p, visible, min, max, spread: min != null ? max - min : 0 };
    }).filter((p) => p.visible.length > 0);

    if (activeCat !== "all") out = out.filter((p) => p.category === activeCat);

    const sorters = {
      price_asc:  (a, b) => a.min - b.min,
      price_desc: (a, b) => b.min - a.min,
      spread:     (a, b) => b.spread - a.spread,
      sites:      (a, b) => b.visible.length - a.visible.length,
    };
    out.sort(sorters[sortBy]);
    return out;
  }, [results, selectedSites, priceRange, minRating, activeCat, sortBy]);

  const stats = useMemo(() => {
    return {
      products: products.length,
      sourcesActive: selectedSites.size,
      totalListings: products.reduce((s, p) => s + p.visible.length, 0),
      totalSavings: products.reduce((s, p) => s + p.spread, 0),
    };
  }, [products, selectedSites]);

  const toggleSite = (id) => {
    const next = new Set(selectedSites);
    next.has(id) ? next.delete(id) : next.add(id);
    setSelectedSites(next);
  };
  const toggleWatch = (k) => {
    const next = new Set(watchlist);
    next.has(k) ? next.delete(k) : next.add(k);
    setWatchlist(next);
  };

  return (
    <div className="min-h-screen" style={{ background: "var(--bone)", color: "var(--ink)" }}>
      <Ticker stats={stats} />
      <Masthead />
      <SearchBar
        query={query}
        setQuery={setQuery}
        onSubmit={runSearch}
        showFilters={showFilters}
        setShowFilters={setShowFilters}
        sortBy={sortBy}
        setSortBy={setSortBy}
        activeCat={activeCat}
        setActiveCat={setActiveCat}
        filterCount={sites.length - selectedSites.size}
        loading={loading}
      />
      <StatsStrip stats={stats} totalSites={sites.length} />

      <div className="max-w-[1400px] mx-auto px-6 lg:px-10 py-8 grid grid-cols-12 gap-6 lg:gap-10">
        {showFilters && (
          <FilterPanel
            sites={sites}
            selectedSites={selectedSites}
            toggleSite={toggleSite}
            setSelectedSites={setSelectedSites}
            priceRange={priceRange}
            setPriceRange={setPriceRange}
            minRating={minRating}
            setMinRating={setMinRating}
          />
        )}

        <main className={showFilters ? "col-span-12 lg:col-span-9" : "col-span-12"}>
          <div className="flex items-end justify-between hairline-b pb-3 mb-6 flex-wrap gap-3">
            <div>
              <div className="micro-label" style={{ color: "var(--signal)" }}>
                FEATURE — TODAY'S SHEET
              </div>
              <h2 className="font-display font-bold text-3xl lg:text-4xl mt-1">
                The Comparator's Floor
                <em className="italic font-normal" style={{ color: "var(--ink-soft)" }}>.</em>
              </h2>
            </div>
            <div className="micro-label" style={{ color: "var(--ink-soft)" }}>
              {results
                ? `${products.length} ${products.length === 1 ? "PRODUCT" : "PRODUCTS"} · ${results.elapsed_ms}MS · ${results.cached ? "CACHED" : "FRESH"}`
                : "—"}
            </div>
          </div>

          {error && (
            <div className="border-2 p-4 mb-6" style={{ borderColor: "var(--signal)", background: "var(--paper)" }}>
              <div className="micro-label" style={{ color: "var(--signal)" }}>ERROR</div>
              <div className="font-display italic mt-1">{error}</div>
            </div>
          )}

          {loading ? (
            <div className="py-20 text-center">
              <div className="inline-flex items-center gap-3 micro-label" style={{ color: "var(--signal)" }}>
                <span className="pulse-dot" /> DISPATCHING SCRAPERS · COMPILING SHEET
              </div>
              <div className="font-display italic text-2xl mt-3" style={{ color: "var(--ink-soft)" }}>
                Hunting prices across twenty storefronts…
              </div>
            </div>
          ) : products.length === 0 ? (
            <div className="py-20 text-center border-2 border-dashed" style={{ borderColor: "var(--rule)" }}>
              <Sparkles size={32} className="mx-auto mb-3" style={{ color: "var(--signal)" }} />
              <div className="font-display font-bold text-2xl">Nothing on the floor.</div>
              <p className="font-display italic mt-2" style={{ color: "var(--ink-soft)" }}>
                Try a different search or loosen the filters.
              </p>
            </div>
          ) : (
            <div className="space-y-0">
              {products.map((p, i) => (
                <ProductRow
                  key={p.product_key}
                  product={p}
                  index={i}
                  isWatched={watchlist.has(p.product_key)}
                  onWatch={() => toggleWatch(p.product_key)}
                  isExpanded={expanded === p.product_key}
                  onToggle={() =>
                    setExpanded(expanded === p.product_key ? null : p.product_key)
                  }
                />
              ))}
            </div>
          )}

          <Methodology />
        </main>
      </div>

      <Footer sites={sites} />
    </div>
  );
}
